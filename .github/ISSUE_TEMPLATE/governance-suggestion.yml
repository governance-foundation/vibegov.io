name: Governance Suggestion
description: Propose a change to a governance rule or section.
title: "[suggestion] "
labels: ["page-feedback", "governance-core"]
body:
  - type: input
    id: page
    attributes:
      label: Page / Rule
      description: Which published page or rule file is this about?
      placeholder: "GOV-02 workflow"
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: Current behavior/text
      description: What currently exists?
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed change
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why this change helps
      description: Explain expected impact on clarity, traceability, or durability.
    validations:
      required: true
