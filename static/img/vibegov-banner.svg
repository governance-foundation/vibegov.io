<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080c14"/>
      <stop offset="60%" style="stop-color:#0d1220"/>
      <stop offset="100%" style="stop-color:#0a0f1c"/>
    </linearGradient>

    <!-- Vibe line gradient -->
    <linearGradient id="vibeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#00e5ff;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="80%" style="stop-color:#00e5ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:0"/>
    </linearGradient>

    <!-- Secondary wave -->
    <linearGradient id="vibeGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0"/>
      <stop offset="25%" style="stop-color:#a855f7;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#00e5ff;stop-opacity:0.4"/>
      <stop offset="75%" style="stop-color:#a855f7;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/>
    </linearGradient>

    <!-- Glow filter for waveform -->
    <filter id="waveGlow" x="-20%" y="-100%" width="140%" height="300%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow for text -->
    <filter id="textGlow" x="-5%" y="-20%" width="110%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Tagline glow filter -->
    <filter id="taglineGlow" x="-8%" y="-60%" width="116%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0.3 0 0.5 0 0
                0   0 0.8 0 0
                1   0 1   0 0
                0   0 0   1 0" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.06"/>
    </pattern>

    <!-- Radial glow behind logo area -->
    <radialGradient id="centerGlow" cx="30%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/>
    </radialGradient>

    <!-- Radial glow right side -->
    <radialGradient id="rightGlow" cx="75%" cy="50%" r="35%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:0"/>
    </radialGradient>

    <!-- Shield gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2540"/>
      <stop offset="100%" style="stop-color:#0d1830"/>
    </linearGradient>

    <!-- Clip for banner bounds -->
    <clipPath id="bannerClip">
      <rect width="1500" height="500"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bgGrad)"/>

  <!-- Grid overlay -->
  <rect width="1500" height="500" fill="url(#grid)"/>

  <!-- Glowing orbs -->
  <rect width="1500" height="500" fill="url(#centerGlow)"/>
  <rect width="1500" height="500" fill="url(#rightGlow)"/>

  <!-- Clipped content group -->
  <g clip-path="url(#bannerClip)">

    <!-- Background waveform (ghost/faint) -->
    <polyline
      points="0,290 60,290 100,240 140,340 180,260 220,320 260,250 300,330 340,265 380,315 420,255 460,325 500,260 540,320 580,248 620,330 660,262 700,318 740,252 780,328 820,258 860,322 900,255 940,325 980,260 1020,318 1060,250 1100,330 1140,265 1180,315 1220,258 1260,322 1300,262 1340,318 1380,252 1420,328 1460,265 1500,290"
      fill="none"
      stroke="#a855f7"
      stroke-width="1"
      opacity="0.06"/>

    <!-- Main waveform -->
    <polyline
      points="0,250 80,250 130,200 180,310 230,220 280,295 330,210 380,300 430,215 480,295 530,205 580,305 630,215 680,298 730,208 780,302 830,212 880,298 930,210 980,300 1030,218 1080,295 1130,212 1180,298 1230,215 1280,300 1330,215 1380,298 1420,250 1500,250"
      fill="none"
      stroke="url(#vibeGrad)"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.35"
      filter="url(#waveGlow)"/>

    <!-- Secondary waveform offset -->
    <polyline
      points="0,260 80,260 130,215 180,320 230,230 280,308 330,222 380,312 430,225 480,308 530,217 580,316 630,226 680,310 730,218 780,312 830,222 880,310 930,220 980,312 1030,228 1080,308 1130,224 1180,310 1230,225 1280,312 1330,225 1380,310 1420,260 1500,260"
      fill="none"
      stroke="url(#vibeGrad2)"
      stroke-width="1"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.2"/>

    <!-- Horizontal rule line top -->
    <line x1="0" y1="1" x2="1500" y2="1" stroke="#00e5ff" stroke-width="2" opacity="0.4"/>
    <!-- Horizontal rule line bottom -->
    <line x1="0" y1="499" x2="1500" y2="499" stroke="#00e5ff" stroke-width="2" opacity="0.4"/>

    <!-- === LEFT SIDE: Logo + Name === -->

    <!-- Shield icon -->
    <g transform="translate(100, 145)">
      <!-- Shield body -->
      <path d="M55 0 L105 18 L105 58 C105 82 82 100 55 110 C28 100 5 82 5 58 L5 18 Z"
            fill="url(#shieldGrad)"
            stroke="#2a3d6a"
            stroke-width="2"/>
      <!-- Shield inner -->
      <path d="M55 8 L97 24 L97 58 C97 78 76 94 55 102 C34 94 13 78 13 58 L13 24 Z"
            fill="none"
            stroke="#1e3060"
            stroke-width="1.5"/>
      <!-- Mini waveform inside shield -->
      <polyline
        points="18,55 26,55 30,43 34,67 38,48 42,62 46,44 55,64 60,48 64,62 68,46 72,60 76,44 80,55 92,55"
        fill="none"
        stroke="url(#vibeGrad)"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#waveGlow)"/>
      <!-- Three dots -->
      <circle cx="46" cy="85" r="3" fill="#a855f7" opacity="0.9"/>
      <circle cx="55" cy="85" r="3" fill="#00e5ff" opacity="0.9"/>
      <circle cx="64" cy="85" r="3" fill="#a855f7" opacity="0.9"/>
    </g>

    <!-- VibeGov wordmark -->
    <text x="235" y="245"
      font-family="'Courier New', 'Courier', monospace"
      font-size="88"
      font-weight="700"
      letter-spacing="-2"
      fill="#ffffff"
      filter="url(#textGlow)">Vibe<tspan fill="url(#vibeGrad)">Gov</tspan></text>

    <!-- Tagline -->
    <text x="237" y="295"
      font-family="'Courier New', 'Courier', monospace"
      font-size="22"
      font-weight="400"
      letter-spacing="3"
      fill="#ccd6f0"
      opacity="0.95"
      filter="url(#taglineGlow)">PROFESSIONAL DELIVERY FOUNDATION</text>

    <!-- URL badge -->
    <rect x="237" y="328" width="178" height="32" rx="4"
          fill="#00e5ff" fill-opacity="0.08"
          stroke="#00e5ff" stroke-width="1" stroke-opacity="0.4"/>
    <text x="326" y="349"
      font-family="'Courier New', 'Courier', monospace"
      font-size="16"
      font-weight="500"
      letter-spacing="1"
      fill="#00e5ff"
      text-anchor="middle"
      opacity="0.9">vibegov.io</text>

    <!-- === RIGHT SIDE: Code snippet === -->
    <rect x="900" y="100" width="530" height="300" rx="8"
          fill="#0a0f1c" fill-opacity="0.8"
          stroke="#1e2d50"
          stroke-width="1.5"/>

    <!-- Window chrome dots -->
    <circle cx="930" cy="128" r="7" fill="#ff5f57"/>
    <circle cx="952" cy="128" r="7" fill="#febc2e"/>
    <circle cx="974" cy="128" r="7" fill="#28c840"/>

    <!-- Window label -->
    <text x="1165" y="133"
      font-family="'Courier New', monospace"
      font-size="13"
      fill="#3a4f70"
      text-anchor="middle">bootstrap.json</text>

    <!-- Divider -->
    <line x1="900" y1="145" x2="1430" y2="145" stroke="#1e2d50" stroke-width="1"/>

    <!-- Code lines -->
    <text x="925" y="175" font-family="'Courier New', monospace" font-size="15" fill="#3a4f70">01</text>
    <text x="960" y="175" font-family="'Courier New', monospace" font-size="15" fill="#a855f7">{</text>

    <text x="925" y="200" font-family="'Courier New', monospace" font-size="15" fill="#3a4f70">02</text>
    <text x="975" y="200" font-family="'Courier New', monospace" font-size="15" fill="#00e5ff">"governance"</text>
    <text x="1105" y="200" font-family="'Courier New', monospace" font-size="15" fill="#ffffff">:</text>
    <text x="1118" y="200" font-family="'Courier New', monospace" font-size="15" fill="#86e4a8">"vibegov"</text>
    <text x="1198" y="200" font-family="'Courier New', monospace" font-size="15" fill="#ffffff">,</text>

    <text x="925" y="225" font-family="'Courier New', monospace" font-size="15" fill="#3a4f70">03</text>
    <text x="975" y="225" font-family="'Courier New', monospace" font-size="15" fill="#00e5ff">"version"</text>
    <text x="1063" y="225" font-family="'Courier New', monospace" font-size="15" fill="#ffffff">:</text>
    <text x="1076" y="225" font-family="'Courier New', monospace" font-size="15" fill="#fbbf24">"1.0.0"</text>
    <text x="1132" y="225" font-family="'Courier New', monospace" font-size="15" fill="#ffffff">,</text>

    <text x="925" y="250" font-family="'Courier New', monospace" font-size="15" fill="#3a4f70">04</text>
    <text x="975" y="250" font-family="'Courier New', monospace" font-size="15" fill="#00e5ff">"rules"</text>
    <text x="1035" y="250" font-family="'Courier New', monospace" font-size="15" fill="#ffffff">:</text>
    <text x="1048" y="250" font-family="'Courier New', monospace" font-size="15" fill="#ffffff">[</text>
    <text x="1060" y="250" font-family="'Courier New', monospace" font-size="15" fill="#86e4a8">".governance/rules"</text>
    <text x="1225" y="250" font-family="'Courier New', monospace" font-size="15" fill="#ffffff">],</text>

    <text x="925" y="275" font-family="'Courier New', monospace" font-size="15" fill="#3a4f70">05</text>
    <text x="975" y="275" font-family="'Courier New', monospace" font-size="15" fill="#00e5ff">"specs"</text>
    <text x="1035" y="275" font-family="'Courier New', monospace" font-size="15" fill="#ffffff">:</text>
    <text x="1048" y="275" font-family="'Courier New', monospace" font-size="15" fill="#86e4a8">".governance/specs"</text>
    <text x="1210" y="275" font-family="'Courier New', monospace" font-size="15" fill="#ffffff">,</text>

    <text x="925" y="300" font-family="'Courier New', monospace" font-size="15" fill="#3a4f70">06</text>
    <text x="975" y="300" font-family="'Courier New', monospace" font-size="15" fill="#00e5ff">"agent"</text>
    <text x="1035" y="300" font-family="'Courier New', monospace" font-size="15" fill="#ffffff">:</text>
    <text x="1048" y="300" font-family="'Courier New', monospace" font-size="15" fill="#86e4a8">"vibegov/agent.txt"</text>

    <text x="925" y="330" font-family="'Courier New', monospace" font-size="15" fill="#3a4f70">07</text>
    <text x="960" y="330" font-family="'Courier New', monospace" font-size="15" fill="#a855f7">}</text>

    <!-- Cursor blink -->
    <rect x="970" y="344" width="10" height="16" fill="#00e5ff" opacity="0.8" rx="1"/>

  </g>
</svg>
