<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4ff"/>
      <stop offset="100%" style="stop-color:#e4eaf8"/>
    </linearGradient>
    <linearGradient id="shieldLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f4ff"/>
    </linearGradient>
    <linearGradient id="vibeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0099cc"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#0099cc"/>
    </linearGradient>
    <filter id="shieldShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#7c3aed" flood-opacity="0.15"/>
    </filter>
    <filter id="waveGlow" x="-20%" y="-100%" width="140%" height="300%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#bgLight)" stroke="#dde4f5" stroke-width="1"/>

  <!-- Shield body -->
  <path d="M50 10 L84 24 L84 52 C84 70 68 84 50 92 C32 84 16 70 16 52 L16 24 Z"
        fill="url(#shieldLight)"
        stroke="#c8d3ee"
        stroke-width="1.5"
        filter="url(#shieldShadow)"/>

  <!-- Shield inner border -->
  <path d="M50 16 L78 28 L78 52 C78 67 64 79 50 86 C36 79 22 67 22 52 L22 28 Z"
        fill="none"
        stroke="#dde4f5"
        stroke-width="1"/>

  <!-- Waveform -->
  <polyline
    points="24,50 30,50 34,38 38,62 42,44 46,56 50,40 54,60 58,46 62,54 66,42 70,58 74,50 76,50"
    fill="none"
    stroke="url(#vibeGrad)"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#waveGlow)"/>

  <!-- Three dots -->
  <circle cx="44" cy="72" r="2.5" fill="#7c3aed" opacity="0.7"/>
  <circle cx="50" cy="72" r="2.5" fill="#0099cc" opacity="0.9"/>
  <circle cx="56" cy="72" r="2.5" fill="#7c3aed" opacity="0.7"/>
</svg>
